version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eweapon-registry-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=eweapon_registry;Username=postgres;Password=${POSTGRES_PASSWORD:-DevPassword123!}
      - Jwt__Key=${JWT_SECRET_KEY:-YourSuperSecretKeyForJwtAuthenticationMinimum32Characters!}
      - Jwt__Issuer=EWeaponRegistry
      - Jwt__Audience=EWeaponRegistryUsers
      - Jwt__ExpirationMinutes=60
      - Encryption__Key=${ENCRYPTION_KEY:-AES256EncryptionKey32BytesLong!!}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - eweapon-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: eweapon-registry-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-DevPassword123!}
      - POSTGRES_DB=eweapon_registry
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eweapon_registry"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eweapon-network
    restart: unless-stopped

networks:
  eweapon-network:
    driver: bridge

volumes:
  postgres_data:
